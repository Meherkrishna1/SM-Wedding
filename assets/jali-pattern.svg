<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <pattern id="jali" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Diamond -->
      <polygon points="20,2 38,20 20,38 2,20" stroke="#c9a84c" stroke-width="0.6" fill="none" opacity="0.5"/>
      <!-- Inner diamond -->
      <polygon points="20,10 30,20 20,30 10,20" stroke="#c9a84c" stroke-width="0.4" fill="none" opacity="0.35"/>
      <!-- Center dot -->
      <circle cx="20" cy="20" r="2" stroke="#c9a84c" stroke-width="0.4" fill="none" opacity="0.4"/>
      <!-- Corner arcs -->
      <path d="M2,20 Q20,2 38,20" stroke="#c9a84c" stroke-width="0.3" fill="none" opacity="0.25"/>
      <path d="M2,20 Q20,38 38,20" stroke="#c9a84c" stroke-width="0.3" fill="none" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#jali)"/>
</svg>
