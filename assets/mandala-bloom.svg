<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <g opacity="0.85">
    <!-- Outer ring petals -->
    <circle cx="200" cy="200" r="190" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
    <circle cx="200" cy="200" r="170" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>
    <!-- 12 outer petals -->
    <g stroke="#c9a84c" stroke-width="0.8" opacity="0.6">
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(0 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(30 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(60 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(90 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(120 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(150 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(180 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(210 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(240 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(270 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(300 200 200)"/>
      <ellipse cx="200" cy="40" rx="8" ry="24" transform="rotate(330 200 200)"/>
    </g>
    <!-- Mid ring -->
    <g stroke="#c9a84c" stroke-width="1" opacity="0.5">
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(0 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(30 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(60 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(90 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(120 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(150 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(180 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(210 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(240 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(270 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(300 200 200)"/>
      <ellipse cx="200" cy="80" rx="10" ry="32" transform="rotate(330 200 200)"/>
    </g>
    <!-- Inner ring lotus -->
    <g stroke="#c9a84c" stroke-width="1.2" opacity="0.7">
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(0 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(45 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(90 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(135 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(180 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(225 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(270 200 200)"/>
      <ellipse cx="200" cy="126" rx="12" ry="38" transform="rotate(315 200 200)"/>
    </g>
    <!-- Diamond lattice -->
    <g stroke="#c9a84c" stroke-width="0.6" opacity="0.4">
      <line x1="200" y1="10" x2="200" y2="390"/>
      <line x1="10" y1="200" x2="390" y2="200"/>
      <line x1="65" y1="65" x2="335" y2="335"/>
      <line x1="335" y1="65" x2="65" y2="335"/>
    </g>
    <!-- Center rings -->
    <circle cx="200" cy="200" r="60" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
    <circle cx="200" cy="200" r="40" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
    <circle cx="200" cy="200" r="22" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="200" cy="200" r="6" fill="#c9a84c" opacity="0.8"/>
    <circle cx="200" cy="200" r="3" fill="#e5c97a"/>
    <!-- Corner diamonds -->
    <g fill="#c9a84c" opacity="0.5">
      <polygon points="200,148 206,155 200,162 194,155"/>
      <polygon points="200,238 206,245 200,252 194,245"/>
      <polygon points="148,200 155,194 162,200 155,206"/>
      <polygon points="238,200 245,194 252,200 245,206"/>
    </g>
  </g>
</svg>
